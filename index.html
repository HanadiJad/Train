<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Today - Tasks</title>
</head>

<body>

    <div class="bg-glow"></div>


    <div class="all-app">
        <header class="app-header">
            <h1 class="title">Daily Tasks</h1>
            <p class="app-sentence">Stay Active, Make Progress</p>

            <div class="statistics">
                <div class="items">
                    <span class="number" id="totalCount">0</span>
                    <span class="label">Total</span>
                </div>
            <div class="stat-divider"></div>

            <div class="items">
                    <span class="number" id="doneCount">0</span>
                    <span class="label">Done</span>
                </div>
            <div class="stat-divider"></div>

            <div class="items">
                    <span class="number" id="pendingCount">0</span>
                    <span class="label">Pending</span>
                </div>
            <div class="stat-divider"></div>

            </div>
        </header>

        <section class="add-tasks">
            <div class="inputs">
                <input type="text" id="taskInput" placeholder="Enter task here" 
                       class="task-input"
                       maxlength="100">
                <button id="addBtn" class="add-btn">
                    <span class="btn-icon">+</span>
                    <span class="btn-text">Add</span>
                </button>
            </div>
        </section>

        <div class="filter-bar">
            <button class="filter-btn active">Total</button>
            <button class="filter-btn">Pending</button>
            <button class="filter-btn">Done</button>
        </div>

        <div id="taskList" class="task-list"></div>

        <script src="app.js"></script>
    </div>
</body>

</html>
